services:
  - type: web
    name: cogit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cogit-db
          property: connectionString
      - key: COGIT_ENCRYPTION_KEY
        generateValue: true

databases:
  - name: cogit-db
    databaseName: cogit
    plan: free
